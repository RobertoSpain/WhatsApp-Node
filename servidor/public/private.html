<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat Privado</title>
  <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="/css/smsPrivados.css">
  <script>
    window.onload = () => {
      const params = new URLSearchParams(window.location.search);
      // Si no hay parámetros, se usan valores por defecto
      const target = params.get('target') || 'Desconocido';
      const sender = params.get('sender') || 'Anónimo';
      document.getElementById('targetName').textContent = target;
      const socket = io();
      socket.emit('nombre', sender);
      socket.emit('identificacion', { nombre: sender, estado: 'privado', avatar: 'avatar1.png' });
      
      document.getElementById('formPrivate').addEventListener('submit', e => {
        e.preventDefault();
        const message = document.getElementById('privateMessage').value;
        if(message.trim()){
          socket.emit('privateMessage', { targetName: target, message });
          document.getElementById('privateChatArea').innerHTML += `<div><b>Tú:</b> ${message}</div>`;
          document.getElementById('privateMessage').value = '';
        }
      });
      
      socket.on('privateMessage', (data) => {
         document.getElementById('privateChatArea').innerHTML += `<div><b>${data.sender}:</b> ${data.message}</div>`;
      });
    }
  </script>
</head>
<body>
  <h3>Chat privado: conversando con <span id="targetName"></span></h3>
  <div id="privateChatArea" style="border:1px solid #ccc; height:300px; overflow:auto;"></div>
  <form id="formPrivate">
    <input id="privateMessage" placeholder="Escribe tu mensaje..." />
    <button type="submit">Enviar</button>
  </form>
</body>
</html>
